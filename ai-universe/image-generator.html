<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Universe • Image Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-light: #a855f7;
      --bg: #f5f3ff;
      --card-bg: #ffffff;
      --text: #1e1b4b;
      --text-secondary: #6b7280;
      --border: #e8e5ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }
    .page-container {
      max-width: 480px;
      width: 100%;
      min-height: 90vh;
      background: var(--card-bg);
      border-radius: 44px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08), 0 10px 25px rgba(102, 51, 153, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }
    .top-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(168, 126, 255, 0.1);
      border-radius: 44px 44px 0 0;
      gap: 10px;
    }
    .back-btn {
      font-size: 1.5rem;
      color: #4a3b7c;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 240, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .back-btn:hover { background: #ece4ff; color: #6d28d9; transform: scale(1.05); }
    .header-title {
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
    }
    .input-section {
      margin-bottom: 16px;
    }
    .prompt-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      background: #faf8ff;
      color: var(--text);
      outline: none;
      transition: 0.3s;
      resize: none;
      min-height: 60px;
    }
    .prompt-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
    }
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      margin-top: 10px;
      transition: 0.3s;
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
    }
    .generate-btn:hover { box-shadow: 0 10px 28px rgba(124, 58, 237, 0.4); transform: translateY(-1px); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .recent-title {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .recent-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .recent-chip {
      background: #f5f0ff;
      padding: 7px 14px;
      border-radius: 18px;
      font-size: 0.7rem;
      cursor: pointer;
      border: 1px solid transparent;
      color: #6d28d9;
      font-weight: 500;
      transition: 0.2s;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-chip:hover { background: #ece4ff; border-color: #c4b5fd; }
    .output-section {
      margin-top: 16px;
    }
    .image-container {
      background: #faf8ff;
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .generated-image {
      max-width: 100%;
      border-radius: 16px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .loading-spinner {
      display: none;
      text-align: center;
      padding: 30px;
    }
    .spinner-circle {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e2d4ff;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 10px;
    }
    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      border: none;
      transition: 0.2s;
      text-align: center;
    }
    .download-btn {
      background: #10b981;
      color: white;
    }
    .download-btn:hover { background: #059669; }
    .regenerate-btn {
      background: #f5f0ff;
      color: var(--primary);
      border: 1px solid var(--border);
    }
    .regenerate-btn:hover { background: #ece4ff; }
    .error-message {
      color: #ef4444;
      font-size: 0.8rem;
      text-align: center;
      padding: 10px;
      display: none;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9e93c2;
    }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 10px; color: #d4c2ff; }
    @media screen and (min-width: 768px) {
      .page-container { max-width: 520px; }
    }
  </style>
</head>
<body>
<div class="page-container">
  <header class="top-header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="header-title">🎨 AI Image Generator</div>
  </header>

  <div class="scroll-area">
    <!-- Input Section -->
    <div class="input-section">
      <textarea class="prompt-input" id="promptInput" placeholder="Describe your image...&#10;Example: A futuristic city at night with neon lights" rows="2"></textarea>
      <button class="generate-btn" id="generateBtn">
        <i class="fas fa-magic"></i> Generate Image
      </button>
    </div>

    <!-- Recent Prompts -->
    <div class="recent-title" id="recentTitle" style="display:none;">🕐 Recent Prompts</div>
    <div class="recent-chips" id="recentChips"></div>

    <!-- Output Section -->
    <div class="output-section">
      <div class="image-container" id="imageContainer">
        <div class="empty-state" id="emptyState">
          <i class="fas fa-image"></i>
          <p>Your generated image will appear here</p>
        </div>
        <img class="generated-image" id="generatedImage" alt="Generated Image">
        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner-circle"></div>
          <p class="loading-text">Generating your image...</p>
        </div>
        <div class="error-message" id="errorMessage">
          ⚠️ Failed to generate image. Please try again.
        </div>
      </div>
      <div class="action-buttons" id="actionButtons" style="display:none;">
        <button class="action-btn download-btn" id="downloadBtn">
          <i class="fas fa-download"></i> Download
        </button>
        <button class="action-btn regenerate-btn" id="regenerateBtn">
          <i class="fas fa-redo"></i> Regenerate
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const API_URL = "http://127.0.0.1:5001/generate-image";
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const generatedImage = document.getElementById('generatedImage');
    const emptyState = document.getElementById('emptyState');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const errorMessage = document.getElementById('errorMessage');
    const actionButtons = document.getElementById('actionButtons');
    const downloadBtn = document.getElementById('downloadBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');
    const recentChips = document.getElementById('recentChips');
    const recentTitle = document.getElementById('recentTitle');

    let isGenerating = false;
    let currentImageData = null;
    let recentPrompts = JSON.parse(localStorage.getItem('aiImagePrompts') || '[]');

    function renderRecentPrompts() {
      if (recentPrompts.length === 0) {
        recentTitle.style.display = 'none';
        recentChips.innerHTML = '';
        return;
      }
      recentTitle.style.display = 'block';
      recentChips.innerHTML = recentPrompts.map((p, i) => 
        `<span class="recent-chip" data-index="${i}" title="${p}">${p.length > 40 ? p.substring(0, 40) + '...' : p}</span>`
      ).join('');
      document.querySelectorAll('.recent-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          const index = parseInt(this.dataset.index);
          promptInput.value = recentPrompts[index];
          promptInput.focus();
        });
      });
    }

    function savePrompt(prompt) {
      recentPrompts = recentPrompts.filter(p => p !== prompt);
      recentPrompts.unshift(prompt);
      if (recentPrompts.length > 10) recentPrompts.pop();
      localStorage.setItem('aiImagePrompts', JSON.stringify(recentPrompts));
      renderRecentPrompts();
    }

    function showLoading() {
      emptyState.style.display = 'none';
      generatedImage.style.display = 'none';
      errorMessage.style.display = 'none';
      loadingSpinner.style.display = 'block';
      actionButtons.style.display = 'none';
    }

    function showImage(imageSrc) {
      loadingSpinner.style.display = 'none';
      emptyState.style.display = 'none';
      errorMessage.style.display = 'none';
      generatedImage.src = imageSrc;
      generatedImage.style.display = 'block';
      actionButtons.style.display = 'flex';
      currentImageData = imageSrc;
    }

    function showError() {
      loadingSpinner.style.display = 'none';
      generatedImage.style.display = 'none';
      emptyState.style.display = 'none';
      errorMessage.style.display = 'block';
      actionButtons.style.display = 'none';
    }

    function showEmpty() {
      loadingSpinner.style.display = 'none';
      generatedImage.style.display = 'none';
      errorMessage.style.display = 'none';
      actionButtons.style.display = 'none';
      emptyState.style.display = 'block';
    }

    async function generateImage(prompt) {
      if (isGenerating) return;
      const text = prompt || promptInput.value.trim();
      if (!text) {
        promptInput.focus();
        return;
      }
      isGenerating = true;
      generateBtn.disabled = true;
      showLoading();
      savePrompt(text);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: text })
        });

        if (!response.ok) throw new Error('API Error');
        const data = await response.json();

        if (data.image_url) {
          showImage(data.image_url);
        } else if (data.image) {
          const imgSrc = data.image.startsWith('data:') ? data.image : `data:image/png;base64,${data.image}`;
          showImage(imgSrc);
        } else {
          throw new Error('No image in response');
        }
      } catch (e) {
        console.error('Image generation error:', e);
        showError();
      } finally {
        isGenerating = false;
        generateBtn.disabled = false;
      }
    }

    function downloadImage() {
      if (!currentImageData) return;
      const a = document.createElement('a');
      a.href = currentImageData;
      a.download = `ai-image-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    generateBtn.addEventListener('click', () => generateImage());
    promptInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generateImage();
      }
    });
    downloadBtn.addEventListener('click', downloadImage);
    regenerateBtn.addEventListener('click', () => generateImage());

    renderRecentPrompts();
    showEmpty();
  })();
</script>
</body>
</html>

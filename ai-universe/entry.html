<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>AI Universe | Neural Launch</title>
  <!-- Font Awesome (minimal, for optional icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* prevents accidental selection during animation */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #f9f5ff, #f0eaff);
      background-attachment: fixed;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      margin: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* animated gradient background (moving light) */
    .animated-bg {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(200, 180, 255, 0.3), rgba(160, 130, 255, 0.1), rgba(255, 255, 255, 0.9));
      animation: slowDrift 18s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes slowDrift {
      0% { transform: translate(0%, 0%) scale(1); }
      100% { transform: translate(3%, 4%) scale(1.05); }
    }

    /* floating particles container */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(140, 100, 250, 0.35);
      border-radius: 50%;
      filter: blur(8px);
      animation: floatGlow 6s infinite ease-in-out;
      will-change: transform, opacity;
    }

    @keyframes floatGlow {
      0% { transform: translateY(20px) scale(1); opacity: 0.2; }
      50% { transform: translateY(-40px) scale(1.3); opacity: 0.5; }
      100% { transform: translateY(20px) scale(1); opacity: 0.2; }
    }

    /* Main glass container (center card) */
    .intro-card {
      position: relative;
      z-index: 10;
      width: 86%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 56px;
      padding: 32px 24px 40px;
      box-shadow: 0 25px 45px rgba(100, 70, 180, 0.15), 0 2px 6px rgba(255, 255, 255, 0.6) inset;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 3D rotating AI Orb */
    .orb-container {
      perspective: 800px;
      margin-bottom: 28px;
      display: flex;
      justify-content: center;
    }

    .ai-orb {
      width: 120px;
      height: 120px;
      background: linear-gradient(145deg, #a07eff, #c084fc);
      border-radius: 50%;
      box-shadow: 0 15px 35px rgba(124, 58, 237, 0.4), 0 0 0 2px rgba(255, 255, 255, 0.6) inset, 0 0 20px rgba(160, 130, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: rotate3D 6s infinite linear, pulseGlow 2.2s infinite alternate;
      transform-style: preserve-3d;
      will-change: transform;
    }

    @keyframes rotate3D {
      0% { transform: rotateY(0deg) rotateX(0deg); }
      25% { transform: rotateY(10deg) rotateX(5deg); }
      50% { transform: rotateY(0deg) rotateX(0deg); }
      75% { transform: rotateY(-10deg) rotateX(-5deg); }
      100% { transform: rotateY(0deg) rotateX(0deg); }
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 15px 35px rgba(124, 58, 237, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.6) inset, 0 0 10px rgba(160, 130, 255, 0.5); }
      100% { box-shadow: 0 25px 45px rgba(124, 58, 237, 0.6), 0 0 0 4px rgba(255, 255, 255, 0.8) inset, 0 0 28px rgba(192, 132, 252, 0.9); }
    }

    .ai-orb i {
      font-size: 3.4rem;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      animation: subtleIconPulse 2s infinite alternate;
    }

    @keyframes subtleIconPulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* Typing text animation */
    .typing-area {
      min-height: 85px;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .typing-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c4ab6, #b57bee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .dynamic-line {
      font-size: 0.95rem;
      font-weight: 500;
      color: #5f4d9e;
      margin-top: 10px;
      min-height: 32px;
      letter-spacing: 0.3px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1rem;
      background-color: #a07eff;
      margin-left: 4px;
      animation: blinkCursor 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blinkCursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Progress bar + percentage */
    .loading-container {
      margin: 28px 0 18px;
    }

    .progress-bar-bg {
      background: rgba(210, 195, 255, 0.5);
      border-radius: 60px;
      height: 6px;
      width: 100%;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #9f7aea, #c084fc);
      border-radius: 60px;
      transition: width 0.08s linear;
      box-shadow: 0 0 6px #c7a9ff;
    }

    .percentage-counter {
      font-size: 0.85rem;
      font-weight: 600;
      color: #5b42a3;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* footer powered by */
    .powered {
      margin-top: 28px;
      font-size: 0.7rem;
      color: #a58fd1;
      font-weight: 400;
      letter-spacing: 0.3px;
      opacity: 0.7;
    }

    /* Touch ripple effect (optional but premium) */
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(160, 130, 255, 0.5), rgba(255,255,255,0));
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes rippleAnim {
      to { transform: scale(10); opacity: 0; }
    }

    /* fade transition before redirect */
    .fade-out-redirect {
      animation: fadeOutTransition 0.5s forwards;
    }

    @keyframes fadeOutTransition {
      0% { opacity: 1; backdrop-filter: blur(18px); }
      100% { opacity: 0; backdrop-filter: blur(0px); visibility: hidden; }
    }

    /* responsive micro-tweaks */
    @media (max-width: 480px) {
      .intro-card {
        width: 90%;
        padding: 28px 20px 36px;
      }
      .ai-orb {
        width: 100px;
        height: 100px;
      }
      .ai-orb i {
        font-size: 2.6rem;
      }
      .typing-text {
        font-size: 1.3rem;
      }
    }

    /* remove default tap highlight */
    button, div, a {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="particles" id="particleContainer"></div>

  <div class="intro-card" id="introCard">
    <div class="orb-container">
      <div class="ai-orb">
        <i class="fas fa-brain"></i>
      </div>
    </div>

    <div class="typing-area">
      <div class="typing-text">AI Universe</div>
      <div class="dynamic-line" id="dynamicMessage">
        <span id="messageSpan"></span><span class="cursor-blink"></span>
      </div>
    </div>

    <div class="loading-container">
      <div class="progress-bar-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="percentage-counter" id="percentageLabel">0%</div>
    </div>

    <div class="powered">
      <i class="fas fa-microchip"></i> Powered by AI Universe
    </div>
  </div>

  <script>
    (function() {
      // ---- floating particles generation (premium background) ----
      const particleContainer = document.getElementById('particleContainer');
      const PARTICLE_COUNT = 38; // optimal for mobile performance
      
      function createParticles() {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          const size = Math.random() * 24 + 6;
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.top = Math.random() * 100 + '%';
          particle.style.animationDelay = (Math.random() * 7) + 's';
          particle.style.animationDuration = (Math.random() * 6 + 4) + 's';
          particle.style.opacity = Math.random() * 0.5 + 0.15;
          particle.style.background = `radial-gradient(circle, rgba(160, 130, 255, 0.5), rgba(200, 180, 250, 0.2))`;
          particleContainer.appendChild(particle);
        }
      }
      createParticles();

      // ---- Dynamic typing messages ----
      const messages = [
        "Initializing Intelligence...",
        "Loading AI Systems...",
        "Calibrating Neural Core...",
        "Synchronizing Universe Data...",
        "Ready to Explore ✨"
      ];
      let msgIndex = 0;
      let charIndex = 0;
      let currentText = "";
      const messageSpan = document.getElementById("messageSpan");
      const dynamicLineDiv = document.getElementById("dynamicMessage");
      
      function typeMessage() {
        if (msgIndex >= messages.length) {
          // after final message keep last text full (no more typing)
          return;
        }
        const fullMsg = messages[msgIndex];
        if (charIndex < fullMsg.length) {
          currentText += fullMsg.charAt(charIndex);
          messageSpan.innerText = currentText;
          charIndex++;
          setTimeout(typeMessage, 45);
        } else {
          // move to next message after a small pause
          msgIndex++;
          charIndex = 0;
          currentText = "";
          if (msgIndex < messages.length) {
            setTimeout(typeMessage, 280);
          } else {
            // typing finished: keep the last line "Ready to Explore ✨" with cursor optional but good
            const cursorSpan = document.querySelector('.cursor-blink');
            if (cursorSpan) cursorSpan.style.display = 'inline-block';
          }
        }
      }
      
      // start typing after a short delay
      setTimeout(typeMessage, 400);
      
      // ---- Loading progress: 0% -> 100% smoothly over 4.5 seconds ----
      let progress = 0;
      const progressFill = document.getElementById('progressFill');
      const percentageLabel = document.getElementById('percentageLabel');
      const totalDuration = 4500; // 4.5 sec loading phase (plus typing animation looks natural)
      const intervalTime = 20; // update every 20ms for smooth
      const stepCount = totalDuration / intervalTime;
      let currentStep = 0;
      
      const progressTimer = setInterval(() => {
        currentStep++;
        progress = Math.min(100, (currentStep / stepCount) * 100);
        const percentInt = Math.floor(progress);
        progressFill.style.width = progress + '%';
        percentageLabel.innerText = percentInt + '%';
        
        if (progress >= 100) {
          clearInterval(progressTimer);
          percentageLabel.innerText = "100%";
          progressFill.style.width = '100%';
          
          // After loading complete, fade out and redirect to index.html
          finishAndRedirect();
        }
      }, intervalTime);
      
      // ---- Touch ripple effect for premium feel ----
      function addRipple(e, element) {
        const rect = element.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const ripple = document.createElement('div');
        ripple.classList.add('ripple-effect');
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.style.position = 'absolute';
        ripple.style.width = '30px';
        ripple.style.height = '30px';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        element.style.position = 'relative';
        element.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      }
      
      const introCard = document.getElementById('introCard');
      introCard.addEventListener('touchstart', (e) => {
        addRipple(e, introCard);
      });
      introCard.addEventListener('mousedown', (e) => {
        addRipple(e, introCard);
      });
      
      // ---- graceful redirection with fade + optional audio stub (optional but structural) ----
      let redirectTriggered = false;
      
      function finishAndRedirect() {
        if (redirectTriggered) return;
        redirectTriggered = true;
        
        // Add subtle fade-out to whole body (premium transition)
        document.body.classList.add('fade-out-redirect');
        // also make the intro card fade slightly but avoid flicker
        introCard.style.transition = 'opacity 0.5s ease';
        introCard.style.opacity = '0';
        
        // Slight delay to see the full 100% and final message
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 600);
      }
      
      // Fallback: if progress reaches 100% earlier due to async? Already handled.
      // In case of any network jitter, keep final loading fallback
      // Additional polished: ensure that if messages not finished but loading finished, we wait until at least last message appears.
      // But we ensure that the last message shows 'Ready to Explore ✨' before redirect.
      // Use interval to check if typing finished AND loading >= 100? 
      let typingCompleted = false;
      const checkTypingComplete = setInterval(() => {
        if (msgIndex >= messages.length && !typingCompleted) {
          typingCompleted = true;
          // if loading also finished, redirect; otherwise wait for loading complete.
          if (progress >= 100) {
            clearInterval(checkTypingComplete);
            // already redirecting from progressTimer, but avoid double call
          }
        }
      }, 100);
      
      // optional: tiny sound structure (not active by default but we respect structure - no actual autoplay due to browser policies, but we keep UI ready)
      // We can add a silent AudioContext stub to show premium structure, but not mandatory.
      // For best practice we don't force audio to avoid autoplay blocks.
      
      // add 3D orb continuous rotating style already in CSS, no extra required
      
      // Enhance dynamic particles with gentle parallax on mousemove (optional for desktop but premium)
      document.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX / window.innerWidth;
        const mouseY = e.clientY / window.innerHeight;
        const particles = document.querySelectorAll('.particle');
        particles.forEach((part, idx) => {
          const speed = 0.02;
          const moveX = (mouseX - 0.5) * speed * 20;
          const moveY = (mouseY - 0.5) * speed * 20;
          part.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
      });
      
      // Ensure that the percentage smoothly reaches 100% and also we lock UI
      // The built-in progress interval does exact.
      
      // fallback if something goes wrong: redirect after max 6 seconds
      setTimeout(() => {
        if (!redirectTriggered && progress >= 100) {
          finishAndRedirect();
        } else if (!redirectTriggered) {
          // force finish and redirect
          clearInterval(progressTimer);
          progressFill.style.width = '100%';
          percentageLabel.innerText = "100%";
          finishAndRedirect();
        }
      }, 5600);
      
      // Add extra detail: animated background gradient already applied.
      // Add subtle typing after full 100% bonus to keep polished
      
      // Cleanup function for performance (no memory leaks)
      window.addEventListener('beforeunload', () => {
        clearInterval(progressTimer);
        clearInterval(checkTypingComplete);
      });
      
      // additional effect: floating soft glow on orb
      const orb = document.querySelector('.ai-orb');
      if (orb) {
        orb.addEventListener('mouseenter', () => {
          orb.style.animation = 'rotate3D 4s infinite linear, pulseGlow 1s infinite alternate';
        });
        orb.addEventListener('mouseleave', () => {
          orb.style.animation = 'rotate3D 6s infinite linear, pulseGlow 2.2s infinite alternate';
        });
      }
      
      // FPS friendly: use will-change on orb
      // Safe area support: body already has env()
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>AI Book · Intelligent Library</title>
  <!-- Font Awesome 6 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-light: #f8f7ff;
      --surface-light: rgba(255, 255, 255, 0.7);
      --text-light: #1e1b2e;
      --text-secondary-light: #4a4458;
      --primary: #7c3aed;
      --primary-soft: #a78bfa;
      --gradient-start: #f5f0ff;
      --gradient-end: #ede9fe;
      --card-glass: rgba(255, 255, 255, 0.6);
      --border-glass: rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 35px rgba(124, 58, 237, 0.08), 0 8px 18px rgba(0,0,0,0.02);
      --transition: all 0.3s ease;
      --bg-particles: rgba(124, 58, 237, 0.08);
    }

    body.dark {
      --bg-light: #0f0a1e;
      --surface-light: rgba(20, 15, 35, 0.75);
      --text-light: #ede9fe;
      --text-secondary-light: #b9aee0;
      --primary: #a78bfa;
      --primary-soft: #c4b5fd;
      --gradient-start: #1a1025;
      --gradient-end: #120c1e;
      --card-glass: rgba(30, 20, 50, 0.55);
      --border-glass: rgba(180, 160, 255, 0.2);
      --shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 20px rgba(124,58,237,0.15);
      --bg-particles: rgba(167, 139, 250, 0.15);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, var(--gradient-start), var(--gradient-end));
      color: var(--text-light);
      min-height: 100vh;
      transition: background 0.4s, color 0.3s;
      overflow-x: hidden;
      position: relative;
      margin: 0;
      padding: 0 1rem 2rem;
      display: flex;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    /* Animated background books & particles */
    .bg-books {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .floating-book {
      position: absolute;
      font-size: 2.8rem;
      opacity: 0.15;
      animation: floatBook 18s infinite ease-in-out;
      color: var(--primary);
      filter: drop-shadow(0 8px 12px rgba(124,58,237,0.3));
    }

    @keyframes floatBook {
      0% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-25px) rotate(3deg); }
      50% { transform: translateY(-15px) rotate(-2deg); }
      75% { transform: translateY(-30px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .particle {
      position: absolute;
      background: var(--primary-soft);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      opacity: 0.25;
      animation: drift 22s infinite alternate;
      filter: blur(1px);
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, -40px); opacity: 0.4; }
    }

    /* Main container */
    .app-container {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(18px);
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      border-radius: 3rem;
      padding: 0.7rem 1.8rem;
      box-shadow: var(--shadow);
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .back-btn, .dark-toggle {
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 1.4rem;
      cursor: pointer;
      transition: var(--transition);
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .back-btn:hover, .dark-toggle:hover {
      background: var(--primary-soft);
      color: white;
    }

    .title {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Search bar */
    .search-wrapper {
      display: flex;
      justify-content: center;
      margin: 0.8rem 0 0.5rem;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--card-glass);
      backdrop-filter: blur(22px);
      border: 1px solid var(--border-glass);
      border-radius: 4rem;
      padding: 0.3rem 0.3rem 0.3rem 2rem;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 25px 40px -15px rgba(124,58,237,0.25);
      transition: var(--transition);
    }

    .search-bar:focus-within {
      box-shadow: 0 0 0 3px rgba(124,58,237,0.5), 0 25px 40px -10px #7c3aed40;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9rem 0.5rem;
      font-size: 1.1rem;
      color: var(--text-light);
      outline: none;
    }

    .search-bar input::placeholder {
      color: var(--text-secondary-light);
      font-weight: 400;
    }

    .search-icon-btn {
      background: var(--primary);
      border: none;
      color: white;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Class sections */
    .class-section {
      background: var(--card-glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border-glass);
      border-radius: 2.5rem;
      padding: 1.5rem 1.2rem;
      margin-bottom: 1.4rem;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .class-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 0.2rem 0;
    }

    .class-title {
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(to right, var(--text-light), var(--primary-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .collapse-icon {
      font-size: 1.4rem;
      transition: transform 0.3s;
      color: var(--primary);
    }

    .class-content {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1.2rem;
      transition: all 0.4s ease;
    }

    .collapsed .class-content {
      display: none;
    }

    .collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    .subject-card {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: 1.8rem;
      padding: 1.2rem 0.6rem;
      text-align: center;
      transition: all 0.25s;
      box-shadow: 0 8px 18px rgba(0,0,0,0.03);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .subject-card:hover {
      transform: translateY(-5px) scale(1.03);
      background: rgba(255,255,255,0.5);
      border-color: var(--primary-soft);
      box-shadow: 0 20px 30px rgba(124,58,237,0.2);
    }

    .subject-icon {
      font-size: 2.2rem;
    }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }

    .btn {
      background: rgba(255,255,255,0.8);
      border: none;
      padding: 0.35rem 0.9rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.75rem;
      color: #1e1b2e;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      backdrop-filter: blur(8px);
    }

    .btn:hover {
      background: var(--primary);
      color: white;
    }

    .sidebar-mini {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 0.8rem;
      justify-content: center;
    }

    .chip {
      background: var(--card-glass);
      backdrop-filter: blur(12px);
      padding: 0.5rem 1.2rem;
      border-radius: 3rem;
      font-size: 0.9rem;
      border: 1px solid var(--border-glass);
      cursor: pointer;
      transition: 0.2s;
    }

    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      font-size: 2rem;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .header {
        padding: 0.5rem 1rem;
      }
      .title {
        font-size: 1.3rem;
      }
      .class-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body class="light">
  <!-- Animated background -->
  <div class="bg-books" id="bgBooksContainer"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
      <span class="title">✨ AI Book</span>
      <button class="dark-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search Class, Subject or Book..." autocomplete="off">
        <button class="search-icon-btn" id="searchButton"><i class="fas fa-search"></i></button>
      </div>
    </div>

    <!-- Quick filters -->
    <div class="sidebar-mini" id="filterChips">
      <span class="chip active" data-filter="all">📚 All Classes</span>
      <span class="chip" data-filter="class8">📘 Class 8</span>
      <span class="chip" data-filter="class9">📗 Class 9</span>
      <span class="chip" data-filter="class10">📙 Class 10</span>
      <span class="chip" data-filter="class11">📕 Class 11</span>
      <span class="chip" data-filter="class12">📓 Class 12</span>
      <span class="chip" data-filter="favorites">⭐ Favorites</span>
    </div>

    <!-- Dynamic container for class sections -->
    <div id="classesContainer"></div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <i class="fas fa-book-open"></i>
      <p>📘 No books found</p>
    </div>
  </div>

  <script>
    (function() {
      // ---------- STRUCTURED BOOK DATABASE ----------
      const classBooks = {
        "Class 8": {
          icon: "📘",
          subjects: {
            "English": { icon: "📖", link: "https://ncert.nic.in/textbook.php?hehd1=0-13" },
            "Hindi": { icon: "📚", link: "https://ncert.nic.in/textbook.php?hhsc1=0-13" },
            "Mathematics": { icon: "📐", link: "https://ncert.nic.in/textbook.php?hemh1=0-13" },
            "Science": { icon: "🔬", link: "https://ncert.nic.in/textbook/pdf/hesc1dd.zip" },
            "History": { icon: "📜", link: "https://ncert.nic.in/textbook.php?hess1=0-13" },
            "Geography": { icon: "🌍", link: "https://ncert.nic.in/textbook.php?hess2=0-13" },
            "Computer": { icon: "💻", link: "https://ncert.nic.in/textbook.php?hect1=0-13" }
          }
        },
        "Class 9": {
          icon: "📗",
          subjects: {
            "English": { icon: "📖", link: "https://ncert.nic.in/textbook.php?iebe1=0-13" },
            "Hindi": { icon: "📚", link: "https://ncert.nic.in/textbook.php?ihsc1=0-13" },
            "Mathematics": { icon: "📐", link: "https://ncert.nic.in/textbook.php?iemh1=0-13" },
            "Science": { icon: "🧪", link: "https://ncert.nic.in/textbook/pdf/iesc1dd.zip" },
            "History": { icon: "📜", link: "https://ncert.nic.in/textbook.php?iess1=0-13" },
            "Geography": { icon: "🌍", link: "https://ncert.nic.in/textbook.php?iess2=0-13" },
            "Computer": { icon: "💻", link: "https://ncert.nic.in/textbook.php?ict1=0-13" }
          }
        },
        "Class 10": {
          icon: "📙",
          subjects: {
            "English": { icon: "📖", link: "https://ncert.nic.in/textbook.php?jeff1=0-13" },
            "Hindi": { icon: "📚", link: "https://ncert.nic.in/textbook.php?jhsc1=0-13" },
            "Mathematics": { icon: "📐", link: "https://ncert.nic.in/textbook.php?jemh1=0-13" },
            "Science": { icon: "⚡", link: "https://ncert.nic.in/textbook/pdf/jesc1ps.pdf" },
            "Physics": { icon: "⚛️", link: "https://ncert.nic.in/textbook/pdf/jesc1dd.zip" },
            "Chemistry": { icon: "🧪", link: "https://ncert.nic.in/textbook/pdf/jesc1ps.pdf" },
            "Biology": { icon: "🌿", link: "https://ncert.nic.in/textbook/pdf/jesc1ps.pdf" },
            "Computer": { icon: "💻", link: "https://ncert.nic.in/textbook.php?jecs1=0-13" }
          }
        },
        "Class 11": {
          icon: "📕",
          subjects: {
            "English": { icon: "📖", link: "https://ncert.nic.in/textbook.php?keww1=0-13" },
            "Physics": { icon: "💡", link: "https://ncert.nic.in/textbook/pdf/keph1dd.zip" },
            "Chemistry": { icon: "⚗️", link: "https://ncert.nic.in/textbook/pdf/kech1dd.zip" },
            "Biology": { icon: "🧬", link: "https://ncert.nic.in/textbook.php?kebo1=0-13" },
            "Mathematics": { icon: "📐", link: "https://ncert.nic.in/textbook.php?kemh1=0-13" },
            "Computer Science": { icon: "💻", link: "https://ncert.nic.in/textbook.php?kecs1=0-13" },
            "Economics": { icon: "📈", link: "https://ncert.nic.in/textbook.php?keec1=0-13" },
            "History": { icon: "📜", link: "https://ncert.nic.in/textbook.php?kess1=0-13" }
          }
        },
        "Class 12": {
          icon: "📓",
          subjects: {
            "English": { icon: "📖", link: "https://ncert.nic.in/textbook.php?lefl1=0-13" },
            "Physics": { icon: "💡", link: "https://ncert.nic.in/textbook/pdf/leph1dd.zip" },
            "Chemistry": { icon: "⚗️", link: "https://ncert.nic.in/textbook/pdf/lech1dd.zip" },
            "Biology": { icon: "🧬", link: "https://ncert.nic.in/textbook.php?lebo1=0-13" },
            "Mathematics": { icon: "📐", link: "https://ncert.nic.in/textbook.php?lemh1=0-13" },
            "Computer Science": { icon: "💻", link: "https://ncert.nic.in/textbook.php?lecs1=0-13" },
            "Economics": { icon: "📈", link: "https://ncert.nic.in/textbook.php?leec1=0-13" },
            "History": { icon: "📜", link: "https://ncert.nic.in/textbook.php?less1=0-13" }
          }
        }
      };

      // State
      let favorites = JSON.parse(localStorage.getItem('aiBookFavorites') || '[]');
      let recentBooks = JSON.parse(localStorage.getItem('aiBookRecent') || '[]');
      let currentFilter = 'all';
      let searchTerm = '';

      // DOM elements
      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');
      const classesContainer = document.getElementById('classesContainer');
      const emptyState = document.getElementById('emptyState');
      const darkToggle = document.getElementById('darkModeToggle');
      const filterChips = document.querySelectorAll('.chip');
      const body = document.body;

      // Dark mode init
      if (localStorage.getItem('darkMode') === 'true') {
        body.classList.add('dark');
        darkToggle.innerHTML = '<i class="fas fa-sun"></i>';
      }
      darkToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        localStorage.setItem('darkMode', isDark);
        darkToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      });

      // Background animation
      function createFloatingBooks() {
        const bgContainer = document.getElementById('bgBooksContainer');
        bgContainer.innerHTML = '';
        const icons = ['📘','📗','📙','📕','📓','📖','📚','✨'];
        for (let i = 0; i < 14; i++) {
          const book = document.createElement('div');
          book.className = 'floating-book';
          book.textContent = icons[i % icons.length];
          book.style.left = Math.random() * 90 + '%';
          book.style.top = Math.random() * 90 + '%';
          book.style.animationDelay = Math.random() * 12 + 's';
          book.style.fontSize = (2 + Math.random() * 2.5) + 'rem';
          bgContainer.appendChild(book);
        }
        for (let i=0;i<20;i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random()*100+'%';
          p.style.top = Math.random()*100+'%';
          p.style.animationDelay = Math.random()*15+'s';
          bgContainer.appendChild(p);
        }
      }
      createFloatingBooks();

      // Helpers
      function addToRecent(className, subjectName, link, icon) {
        const entry = { class: className, subject: subjectName, link, icon };
        recentBooks = recentBooks.filter(b => !(b.class === className && b.subject === subjectName));
        recentBooks.unshift(entry);
        if (recentBooks.length > 8) recentBooks.pop();
        localStorage.setItem('aiBookRecent', JSON.stringify(recentBooks));
      }

      function toggleFavorite(className, subjectName) {
        const key = `${className}::${subjectName}`;
        if (favorites.includes(key)) {
          favorites = favorites.filter(f => f !== key);
        } else {
          favorites.push(key);
        }
        localStorage.setItem('aiBookFavorites', JSON.stringify(favorites));
        renderClasses();
      }

      function openBook(className, subjectName, link, icon) {
        addToRecent(className, subjectName, link, icon);
        window.open(link, "_blank");
      }

      function matchesSearch(className, subjectName) {
        if (!searchTerm.trim()) return true;
        const term = searchTerm.toLowerCase();
        return className.toLowerCase().includes(term) || subjectName.toLowerCase().includes(term);
      }

      function renderClasses() {
        classesContainer.innerHTML = '';
        let visibleCount = 0;

        Object.keys(classBooks).forEach(className => {
          const classData = classBooks[className];
          const subjects = classData.subjects;
          
          // Filter subjects based on search & favorites
          let filteredSubjects = Object.keys(subjects).filter(subj => {
            const key = `${className}::${subj}`;
            const isFavMatch = currentFilter === 'favorites' ? favorites.includes(key) : true;
            const searchMatch = matchesSearch(className, subj);
            return isFavMatch && searchMatch;
          });

          // Class filter mapping
          const classFilterMap = {
            'class8': 'Class 8',
            'class9': 'Class 9',
            'class10': 'Class 10',
            'class11': 'Class 11',
            'class12': 'Class 12'
          };
          if (currentFilter.startsWith('class') && classFilterMap[currentFilter] !== className) {
            filteredSubjects = [];
          }

          if (filteredSubjects.length === 0 && currentFilter !== 'all' && currentFilter !== 'favorites') {
            return;
          }

          visibleCount += filteredSubjects.length;

          const section = document.createElement('div');
          section.className = 'class-section';
          section.innerHTML = `
            <div class="class-header">
              <div class="class-title">${classData.icon} ${className}</div>
              <i class="fas fa-chevron-down collapse-icon"></i>
            </div>
            <div class="class-content" id="content-${className.replace(/\s/g,'')}"></div>
          `;

          const contentDiv = section.querySelector('.class-content');
          
          filteredSubjects.forEach(subj => {
            const subjData = subjects[subj];
            const isFav = favorites.includes(`${className}::${subj}`);
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
              <div class="subject-icon">${subjData.icon}</div>
              <strong>${subj}</strong>
              <div class="card-actions">
                <button class="btn open-btn"><i class="fas fa-book-open"></i> Open</button>
                <button class="btn fav-btn"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></button>
              </div>
            `;
            card.querySelector('.open-btn').addEventListener('click', (e) => {
              e.stopPropagation();
              openBook(className, subj, subjData.link, subjData.icon);
            });
            card.querySelector('.fav-btn').addEventListener('click', (e) => {
              e.stopPropagation();
              toggleFavorite(className, subj);
            });
            contentDiv.appendChild(card);
          });

          // Collapse toggle
          const header = section.querySelector('.class-header');
          header.addEventListener('click', () => {
            section.classList.toggle('collapsed');
          });

          classesContainer.appendChild(section);
        });

        if (visibleCount === 0) {
          emptyState.style.display = 'block';
        } else {
          emptyState.style.display = 'none';
        }
      }

      // Event listeners
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderClasses();
      });
      searchButton.addEventListener('click', () => {
        searchTerm = searchInput.value;
        renderClasses();
      });
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          searchTerm = searchInput.value;
          renderClasses();
        }
      });

      filterChips.forEach(chip => {
        chip.addEventListener('click', () => {
          filterChips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentFilter = chip.dataset.filter;
          renderClasses();
        });
      });

      // Initial render
      renderClasses();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Universe • AI Tools Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f3ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }
    .page-container {
      max-width: 480px;
      width: 100%;
      height: 90vh;
      background: #ffffff;
      border-radius: 44px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08), 0 10px 25px rgba(102, 51, 153, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(168, 126, 255, 0.1);
      border-radius: 44px 44px 0 0;
      z-index: 10;
    }
    .back-btn {
      font-size: 1.5rem;
      color: #4a3b7c;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 240, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .back-btn:hover {
      background: #ece4ff;
      color: #6d28d9;
      transform: scale(1.05);
    }
    .header-title {
      font-weight: 700;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .pro-icon {
      font-size: 1.5rem;
      color: #fbbf24;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 240, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .pro-icon:hover {
      background: #ece4ff;
      transform: scale(1.05);
    }
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 10px;
      scroll-behavior: smooth;
    }
    .scroll-area::-webkit-scrollbar {
      width: 4px;
    }
    .scroll-area::-webkit-scrollbar-track {
      background: #ffffff;
    }
    .scroll-area::-webkit-scrollbar-thumb {
      background: #c3a6ff;
      border-radius: 10px;
    }
    .search-box {
      background: #ffffff;
      border-radius: 30px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.08);
      border: 1px solid rgba(195, 166, 255, 0.4);
      margin-bottom: 18px;
      transition: box-shadow 0.25s;
    }
    .search-box:focus-within {
      box-shadow: 0 12px 28px rgba(124, 58, 237, 0.18);
      border-color: #a78bfa;
    }
    .search-box input {
      border: none;
      outline: none;
      font-size: 0.9rem;
      font-weight: 400;
      width: 100%;
      background: transparent;
      color: #211f33;
      font-family: 'Poppins', sans-serif;
    }
    .search-box input::placeholder {
      color: #9e93c2;
      font-weight: 300;
    }
    .search-box i {
      color: #a78bfa;
      font-size: 1rem;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 80px;
    }
    .tool-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 18px 14px;
      border: 1px solid rgba(221, 214, 254, 0.6);
      box-shadow: 0 10px 22px rgba(139, 92, 246, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.04), rgba(168, 85, 247, 0.02));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .tool-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 38px rgba(124, 58, 237, 0.16);
      border-color: #c4b5fd;
    }
    .tool-card:hover::before {
      opacity: 1;
    }
    .tool-card.active-tool {
      border: 2px solid #7c3aed;
      background: #f3ecff;
      box-shadow: 0 0 0 4px rgba(124,58,237,0.2);
    }
    .tool-icon {
      font-size: 2.2rem;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0ff;
      position: relative;
      z-index: 1;
    }
    .tool-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #2d1b5e;
      position: relative;
      z-index: 1;
    }
    .tool-desc {
      font-size: 0.7rem;
      color: #6b5e9a;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }
    .tool-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      width: fit-content;
      position: relative;
      z-index: 1;
    }
    .badge-ready {
      background: #d1fae5;
      color: #065f46;
    }
    .badge-pro {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1e1b2e;
      font-weight: 700;
    }
    .open-btn {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.25s;
      position: relative;
      z-index: 1;
      width: fit-content;
      font-family: 'Poppins', sans-serif;
    }
    .open-btn:hover {
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
    }
    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 12px 18px;
      border-top: 1px solid rgba(209, 190, 255, 0.5);
      border-radius: 0 0 44px 44px;
    }
    .nav-item {
      color: #8479b5;
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
    }
    .nav-item i {
      font-size: 1.3rem;
    }
    .nav-item.active {
      color: #7c3aed;
      font-weight: 600;
    }
    .voice-btn-center {
      background: linear-gradient(145deg, #a855f7, #7c3aed);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -26px;
      box-shadow: 0 12px 28px #a78bfa, 0 0 25px #c084fc;
      color: white;
      font-size: 1.6rem;
      animation: floatGlow 2.2s infinite;
      cursor: pointer;
    }
    @keyframes floatGlow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.25s ease;
    }
    .modal-box {
      background: white;
      border-radius: 28px;
      padding: 28px 22px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
    }
    .modal-box h3 {
      color: #2d1b5e;
      margin: 10px 0;
    }
    .modal-box p {
      color: #6b5e9a;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .modal-close {
      background: #f5f0ff;
      border: none;
      padding: 10px 24px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      color: #7c3aed;
      font-family: 'Poppins', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @media screen and (min-width: 768px) {
      .page-container {
        max-width: 520px;
        height: 88vh;
      }
      .tools-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
    }
    @media screen and (min-width: 1024px) {
      .page-container {
        max-width: 600px;
        height: 90vh;
      }
      .tools-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
<div class="page-container">
  <header class="top-header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="header-title">AI Tools Hub</div>
    <div class="pro-icon"><i class="fas fa-crown"></i></div>
  </header>

  <div class="scroll-area" id="scrollArea">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search AI tools...">
    </div>

    <div class="tools-grid" id="toolsGrid">
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="chat.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
    <div class="voice-btn-center" onclick="window.location.href='chat.html'"><i class="fas fa-microphone"></i></div>
    <a href="models.html" class="nav-item active"><i class="fas fa-cubes"></i><span>Models</span></a>
    <a href="#" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
  </nav>
</div>

<script>
  (function() {
    const toolsData = [
      
      { name: 'AI Voice Assistant', icon: '🎤', desc: 'Talk to AI with natural voice commands', badge: 'Ready', badgeClass: 'badge-ready', pro: false, url: 'voice-ai.html' },
      { name: 'AI Resume Maker', icon: '📄', desc: 'Build professional resumes in seconds', badge: 'Ready', badgeClass: 'badge-pro', pro: true, url: 'resume-maker.html' },
      
      { name: 'AI books', icon: '📝', desc: 'Smart notes with AI formatting', badge: 'Ready', badgeClass: 'badge-ready', pro: false, url: 'aibook.html' },
      { name: 'AI QRgenerator', icon: '✨', desc: 'Read and summarize PDFs instantly', badge: 'Ready', badgeClass: 'badge-ready', pro: false, url: 'aiQRcode.html' }
    ];

    const toolsGrid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');
    let searchQuery = '';

    function showModal(tool) {
      const existing = document.querySelector('.modal-overlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box">
          <div style="font-size:3rem;">${tool.icon}</div>
          <h3>${tool.name}</h3>
          <p>${tool.desc}</p>
          <p style="font-size:0.7rem; color:#9e93c2;">Tool page: ${tool.url}</p>
          <button class="modal-close">Close</button>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('.modal-close').addEventListener('click', () => {
        overlay.remove();
      });
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
    }

    function renderTools() {
      toolsGrid.innerHTML = '';
      const filtered = toolsData.filter(tool =>
        tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        tool.desc.toLowerCase().includes(searchQuery.toLowerCase())
      );

      if (filtered.length === 0) {
        toolsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#9e93c2;">No tools found</div>';
        return;
      }

      filtered.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.innerHTML = `
          <div class="tool-icon">${tool.icon}</div>
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.desc}</div>
          <span class="tool-badge ${tool.badgeClass}">${tool.badge}</span>
          <button class="open-btn">Open Tool</button>
        `;
        card.addEventListener('click', function(e) {
          if (e.target.classList.contains('open-btn')) {
            e.stopPropagation();
          }
          document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active-tool'));
          card.classList.add('active-tool');
          setTimeout(() => {
            showModal(tool);
          }, 300);
        });
        card.querySelector('.open-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active-tool'));
          card.classList.add('active-tool');
          setTimeout(() => {
            showModal(tool);
          }, 300);
        });
        toolsGrid.appendChild(card);
      });
    }

    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTools();
    });

    renderTools();
  })();
</script>
</body>
</html>

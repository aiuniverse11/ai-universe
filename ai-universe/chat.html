<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, height=device-height">
  <title>AI Universe • Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fc;
      --bg-chat: #ffffff;
      --text-primary: #1e1e2f;
      --text-secondary: #5a5a7a;
      --border-light: rgba(0, 0, 0, 0.05);
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --user-bubble: #4f46e5;
      --ai-bubble: #f4f6fc;
      --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.06);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --transition: 0.2s ease;
      --glass-bg: rgba(255, 255, 255, 0.8);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f3f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* main container */
    .chat-container {
      max-width: 520px;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
      border-radius: 0;
    }

    @media (min-width: 768px) {
      body {
        padding: 16px;
        background: #eef0f5;
      }
      .chat-container {
        height: 94vh;
        height: 94dvh;
        border-radius: 36px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
      }
    }

    /* HEADER */
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border-light);
      z-index: 20;
      position: sticky;
      top: 0;
    }

    .menu-btn {
      font-size: 1.6rem;
      color: #2d2d4a;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 245, 250, 0.8);
      border-radius: 14px;
      cursor: pointer;
      transition: all var(--transition);
      border: none;
    }
    .menu-btn:hover {
      background: #e9e9f2;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ai-logo {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3rem;
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.3rem;
      color: #1e1e2f;
      letter-spacing: -0.3px;
    }

    .new-chat-header-btn {
      background: #f1f1f7;
      border: none;
      color: #4f46e5;
      font-size: 1.4rem;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .new-chat-header-btn:hover {
      background: #e4e4f5;
    }

    /* SIDEBAR */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .sidebar-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar-history {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      width: 280px;
      background: white;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 8px 0 25px rgba(0,0,0,0.1);
    }
    .sidebar-history.open {
      transform: translateX(0);
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .history-item {
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item.active {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
    }
    .delete-chat-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* CHAT MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #b0b0c0;
      gap: 12px;
    }
    .empty-logo {
      background: #f0f0ff;
      width: 70px;
      height: 70px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #4f46e5;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeSlide 0.25s ease;
    }
    .message.user {
      justify-content: flex-end;
    }
    .ai-avatar {
      background: #e8e9ff;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4f46e5;
    }
    .bubble {
      max-width: 82%;
      padding: 14px 18px;
      border-radius: 22px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      position: relative;
    }
    .user .bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 8px;
      box-shadow: 0 8px 18px rgba(79,70,229,0.2);
    }
    .ai .bubble {
      background: var(--ai-bubble);
      color: #1e1e2f;
      border-bottom-left-radius: 8px;
    }
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #f4f6fc;
      border-radius: 22px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #a5a6f6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    @keyframes bounce {
      0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}
    }
    @keyframes fadeSlide {
      from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}
    }

    /* INPUT */
    .input-bar {
      padding: 12px 16px 20px;
      background: white;
      border-top: 1px solid rgba(0,0,0,0.03);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      bottom: 0;
    }
    .input-wrapper {
      flex: 1;
      background: #f5f6fa;
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 4px 6px 4px 18px;
      border: 1px solid #e4e5f0;
      transition: 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .input-wrapper input {
      border: none;
      background: transparent;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .voice-btn, .send-btn {
      background: #f1f1f7;
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #4f46e5;
      font-size: 1.2rem;
      transition: 0.2s;
    }
    .send-btn {
      background: #4f46e5;
      color: white;
    }
    .send-btn:disabled {
      opacity: 0.5;
    }
    .file-preview {
      padding: 6px 18px;
      font-size: 0.8rem;
      background: #f9f9ff;
      display: none;
    }
    .file-preview.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="overlay"></div>
  <aside class="sidebar-history" id="sidebarHistory">
    <div class="sidebar-header">
      <strong>History</strong>
      <button id="newChatSidebarBtn" style="background:#4f46e5;color:white;border:none;padding:6px 14px;border-radius:20px;">+ New</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </aside>

  <div class="chat-container">
    <header class="top-header">
      <button class="menu-btn" id="historyToggle"><i class="fas fa-bars"></i></button>
      <div class="logo-area">
        <div class="ai-logo"><i class="fas fa-robot"></i></div>
        <span class="logo-text">AI Universe</span>
      </div>
      <button class="new-chat-header-btn" id="newChatHeaderBtn"><i class="fas fa-plus"></i></button>
    </header>

    <div class="file-preview" id="filePreview"><span id="filePreviewName"></span><span id="removeFileBtn" style="color:red;cursor:pointer;"><i class="fas fa-times"></i></span></div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo"><i class="fas fa-robot"></i></div>
        <span>Start chatting</span>
      </div>
    </div>

    <div class="input-bar">
      <button class="voice-btn" id="voiceButton"><i class="fas fa-microphone"></i></button>
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Type a message or hold to speak">
        <label for="fileUpload" style="color:#6b6b8a;padding:8px;cursor:pointer;"><i class="fas fa-paperclip"></i></label>
        <input type="file" id="fileUpload" style="display:none;" accept="image/*,.pdf,.doc,.docx,.txt">
      </div>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    (function() {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const chatMessages=document.getElementById('chatMessages'),messageInput=document.getElementById('messageInput'),sendBtn=document.getElementById('sendBtn'),voiceBtn=document.getElementById('voiceButton'),fileUpload=document.getElementById('fileUpload'),filePreview=document.getElementById('filePreview'),filePreviewName=document.getElementById('filePreviewName'),removeFileBtn=document.getElementById('removeFileBtn'),historyList=document.getElementById('historyList'),sidebarHistory=document.getElementById('sidebarHistory'),overlay=document.getElementById('overlay'),historyToggle=document.getElementById('historyToggle'),newChatSidebarBtn=document.getElementById('newChatSidebarBtn'),newChatHeaderBtn=document.getElementById('newChatHeaderBtn'),emptyState=document.getElementById('emptyState');

      const STORAGE_KEY='aiUniverseConversations_v5',AGENT='chat-ai';
      let currentConversationId=null,isProcessing=false,attachedFile=null,extractedFileContent='',currentTopic='',conversationContext=[];

      const FIXED_OWNER_DATA = {
        name: "Aryan Kumar", from: "Ranchi, Jharkhand, India", role: "AI Universe Architect & Lead Developer",
        father: "Dr. Rajeshwar Choudhary ( Professor )", mother: "Mis. Pratima devi"
      };
      const OWNER_RESPONSE = `Name: ${FIXED_OWNER_DATA.name}\nFrom: ${FIXED_OWNER_DATA.from}\nRole: ${FIXED_OWNER_DATA.role}\nFather: ${FIXED_OWNER_DATA.father}\nMother: ${FIXED_OWNER_DATA.mother}`;

      function isOwnerQuery(msg){ const m=msg.toLowerCase(); return ["who made you","who created you","owner","tumko kisne banaya","creator","who built you"].some(t=>m.includes(t)); }
      function isPersonalDetailQuery(msg){ const m=msg.toLowerCase(); return ["mother name","father name","family","personal","biography","aryan"].some(t=>m.includes(t)); }
      function getOwnerResponse(message){ if(isOwnerQuery(message)) return OWNER_RESPONSE; if(isPersonalDetailQuery(message)) return "No additional data available."; return null; }

      function getConversations(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch(e){return{};}}
      function saveConversations(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
      function getAgentConversations(){const all=getConversations();return all[AGENT]||[];}
      function saveAgentConversations(conversations){const all=getConversations();all[AGENT]=conversations;saveConversations(all);}
      function generateId(){return AGENT+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,6);}
      function generateSmartTitle(text){return text.substring(0,40) || 'New Chat';}
      function detectLanguage(text){return'en';}
      function detectIntent(text){return'general';}
      function selectBestModel(){return'gemini';}

      function toggleEmptyState(show){
        if(emptyState) emptyState.style.display = show ? 'flex' : 'none';
      }

      function createNewConversation(){
        currentConversationId=generateId();
        const conversations=getAgentConversations();
        conversations.unshift({id:currentConversationId,agent:AGENT,title:'New Chat',messages:[],createdAt:Date.now(),updatedAt:Date.now(),topic:'',context:[]});
        saveAgentConversations(conversations);
        chatMessages.innerHTML='';
        chatMessages.appendChild(emptyState);
        toggleEmptyState(true);
        conversationContext=[];
        renderHistoryList();
        currentTopic='';
      }

      function loadConversation(id){
        const conversations=getAgentConversations();
        const conv=conversations.find(c=>c.id===id);
        if(!conv) return;
        currentConversationId=id;
        currentTopic=conv.topic||'';
        conversationContext=conv.context||[];
        chatMessages.innerHTML='';
        if(conv.messages.length===0){
          chatMessages.appendChild(emptyState);
          toggleEmptyState(true);
        } else {
          toggleEmptyState(false);
          conv.messages.forEach(msg=>{
            if(msg.role==='user') renderUserMessage(msg.content,msg.time,msg.file);
            else renderAIMessage(msg.content,msg.time);
          });
        }
        renderHistoryList();
        scrollToBottom();
      }

      function deleteConversation(id){
        let conversations=getAgentConversations();
        conversations=conversations.filter(c=>c.id!==id);
        saveAgentConversations(conversations);
        if(currentConversationId===id){
          if(conversations.length>0) loadConversation(conversations[0].id);
          else createNewConversation();
        }
        renderHistoryList();
      }

      function addMessageToConversation(role,content,file=null){
        const msg={role,content,time:Date.now()};
        if(file) msg.file={name:file.name,size:file.size,type:file.type};
        const conversations=getAgentConversations();
        const index=conversations.findIndex(c=>c.id===currentConversationId);
        if(index>=0){
          conversations[index].messages.push(msg);
          if(role==='user' && conversations[index].title==='New Chat') conversations[index].title=generateSmartTitle(content);
          if(role==='user'){ conversationContext.push({role:'user',content}); }
          else { conversationContext.push({role:'ai',content}); }
          conversations[index].context=conversationContext;
          conversations[index].updatedAt=Date.now();
          saveAgentConversations(conversations);
        }
      }

      function scrollToBottom(){ requestAnimationFrame(()=>{ chatMessages.scrollTop=chatMessages.scrollHeight; }); }
      function escapeHTML(text){ const div=document.createElement('div'); div.textContent=text; return div.innerHTML; }
      function formatMarkdown(text){ return text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }

      function renderUserMessage(text,ts,file=null){
        toggleEmptyState(false);
        const div=document.createElement('div'); div.className='message user';
        let content=escapeHTML(text);
        if(file) content+=`<div style="font-size:0.7rem;opacity:0.8;">📎 ${file.name}</div>`;
        div.innerHTML=`<div class="bubble">${content}<div style="font-size:0.6rem;opacity:0.7;margin-top:4px;">${new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
        chatMessages.appendChild(div); scrollToBottom();
      }

      function renderAIMessage(text,ts){
        toggleEmptyState(false);
        const div=document.createElement('div'); div.className='message ai';
        div.innerHTML=`<div class="ai-avatar"><i class="fas fa-robot"></i></div><div class="bubble">${formatMarkdown(text)}<div style="font-size:0.6rem;opacity:0.6;margin-top:4px;">${new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
        chatMessages.appendChild(div); scrollToBottom();
      }

      function showTyping(){
        const div=document.createElement('div'); div.className='message ai'; div.id='typingIndicator';
        div.innerHTML=`<div class="ai-avatar"><i class="fas fa-robot"></i></div><div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
        chatMessages.appendChild(div); scrollToBottom();
      }
      function hideTyping(){ const el=document.getElementById('typingIndicator'); if(el) el.remove(); }

      function renderHistoryList(){
        const conversations=getAgentConversations();
        historyList.innerHTML=conversations.map(c=>`<div class="history-item ${c.id===currentConversationId?'active':''}" data-id="${c.id}"><span>${c.title||'New Chat'}</span><button class="delete-chat-btn" data-id="${c.id}"><i class="fas fa-trash"></i></button></div>`).join('');
        document.querySelectorAll('.history-item').forEach(item=>{ item.addEventListener('click',function(e){ if(e.target.closest('.delete-chat-btn'))return; loadConversation(this.dataset.id); closeSidebar(); }); });
        document.querySelectorAll('.delete-chat-btn').forEach(btn=>{ btn.addEventListener('click',function(e){ e.stopPropagation(); deleteConversation(this.dataset.id); }); });
      }

      function openSidebar(){ sidebarHistory.classList.add('open'); overlay.classList.add('active'); }
      function closeSidebar(){ sidebarHistory.classList.remove('open'); overlay.classList.remove('active'); }

      async function extractFileContent(file){ return new Promise((resolve)=>{ const reader=new FileReader(); reader.onload=function(e){ if(file.type==='application/pdf'){ resolve('[PDF content extracted]'); } else { resolve(e.target.result.substring(0,2000)); } }; if(file.type.startsWith('image/')) reader.readAsArrayBuffer(file); else reader.readAsText(file); }); }

      // 🔥 IMPROVED AI RESPONSE WITH SMART FALLBACK
      async function getAIResponse(message){
        const ownerResponse = getOwnerResponse(message);
        if (ownerResponse !== null) return ownerResponse;

        const lang='en';
        const intent=detectIntent(message);
        const model=selectBestModel(intent);
        const contextStr=conversationContext.slice(-6).map(c=>`${c.role==='user'?'User':'AI'}: ${c.content}`).join('\n');
        const fullMessage = `${contextStr}\nUser: ${message}`;

        try {
          const res=await fetch("http://localhost:5000/chat",{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:fullMessage,topic:currentTopic,model:model,fileContent:extractedFileContent,languageMode:"auto",language:lang})
          });
          const data=await res.json();
          let reply = data.reply || '';
          if(!reply || reply.includes("No additional data") || reply.includes("unavailable")){
            reply = generateSmartFallback(message);
          }
          return reply;
        } catch(e){
          return generateSmartFallback(message);
        }
      }

      function generateSmartFallback(userMsg){
        const msg = userMsg.toLowerCase();
        if(msg.includes("cutoff") || msg.includes("rank") || msg.includes("polytechnic")){
          return "Based on previous Jharkhand Polytechnic trends and available counselling data, the expected cutoff range was around 1500–4500 rank for general category. Exact official data may vary each year. I recommend checking the official JCECEB portal for the latest cutoff.";
        }
        if(msg.includes("syllabus") || msg.includes("exam")){
          return "While I don't have the exact syllabus memorized, most engineering entrance exams cover Physics, Chemistry, and Mathematics from the 11th and 12th standard curriculum. Would you like a topic-wise breakdown?";
        }
        if(msg.includes("fees") || msg.includes("college")){
          return "College fees typically range between ₹30,000 to ₹1,50,000 per year depending on the institution. Government colleges are usually more affordable. I'd suggest checking the official college website for precise figures.";
        }
        return "Based on available trends and previous data, I'd estimate the answer relates to common patterns in this domain. For the most accurate information, I recommend cross-referencing with official sources. Is there anything else I can help analyze?";
      }

      async function sendMessage(){
        if(isProcessing) return;
        const text=messageInput.value.trim();
        if(!text && !attachedFile) return;
        const displayText=text||(attachedFile?`File: ${attachedFile.name}`:'');
        if(attachedFile) extractedFileContent = await extractFileContent(attachedFile);
        renderUserMessage(displayText,Date.now(),attachedFile);
        addMessageToConversation('user',displayText,attachedFile);
        messageInput.value=''; attachedFile=null; filePreview.classList.remove('show');
        showTyping(); isProcessing=true; sendBtn.disabled=true;
        try{
          const aiReply=await getAIResponse(displayText);
          hideTyping(); renderAIMessage(aiReply,Date.now()); addMessageToConversation('ai',aiReply);
          renderHistoryList(); extractedFileContent='';
        }catch(e){ hideTyping(); renderAIMessage("I encountered an issue. Please try again.",Date.now()); }
        finally{ isProcessing=false; sendBtn.disabled=false; }
      }

      sendBtn.addEventListener('click',sendMessage);
      messageInput.addEventListener('keypress',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendMessage(); } });
      voiceBtn.addEventListener('click',()=>{ alert("Voice input ready (simulated)."); });
      fileUpload.addEventListener('change',function(e){ const file=e.target.files[0]; if(file){ attachedFile=file; filePreviewName.textContent='📎 '+file.name; filePreview.classList.add('show'); } });
      removeFileBtn.addEventListener('click',()=>{ attachedFile=null; filePreview.classList.remove('show'); });
      historyToggle.addEventListener('click',openSidebar);
      overlay.addEventListener('click',closeSidebar);
      newChatSidebarBtn.addEventListener('click',()=>{ createNewConversation(); closeSidebar(); });
      newChatHeaderBtn.addEventListener('click',createNewConversation);

      window.addEventListener('load',()=>{
        const conversations=getAgentConversations();
        if(conversations.length>0){ loadConversation(conversations[0].id); }
        else { createNewConversation(); }
        renderHistoryList();
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Universe • Feedback</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--primary:#8b5cf6;
--secondary:#c084fc;
--bg:#f6f3ff;
--text:#2e1065;
--glass:rgba(255,255,255,0.7);
}

body{
background:linear-gradient(145deg,#f6f3ff,#eef4ff);
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:480px;
}

.card{
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.4);
border-radius:35px;
padding:22px;
box-shadow:
0 10px 30px rgba(139,92,246,0.12),
inset 0 1px 1px rgba(255,255,255,0.6);
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:24px;
}

.back-btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:white;
color:var(--primary);
font-size:18px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:.3s;
}

.back-btn:hover{
transform:scale(1.05);
}

.title{
text-align:center;
flex:1;
}

.title h1{
font-size:1.5rem;
background:linear-gradient(90deg,var(--primary),var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title p{
font-size:.75rem;
color:#666;
margin-top:4px;
}

.input-group{
margin-bottom:18px;
position:relative;
}

.input-group i{
position:absolute;
top:16px;
left:16px;
color:#9d7dff;
font-size:15px;
}

input,
textarea,
select{
width:100%;
border:none;
outline:none;
padding:15px 18px 15px 45px;
border-radius:18px;
background:rgba(255,255,255,0.9);
font-size:.9rem;
color:#333;
box-shadow:0 3px 10px rgba(0,0,0,0.03);
transition:.3s;
}

textarea{
resize:none;
height:120px;
padding-top:15px;
}

input:focus,
textarea:focus,
select:focus{
transform:translateY(-1px);
box-shadow:0 5px 18px rgba(139,92,246,0.12);
}

.counter{
font-size:.75rem;
text-align:right;
margin-top:5px;
color:#777;
}

.rating{
display:flex;
justify-content:center;
gap:8px;
margin:20px 0;
}

.rating i{
font-size:28px;
cursor:pointer;
color:#d4d4d8;
transition:.3s;
}

.rating i.active{
color:#fbbf24;
transform:scale(1.1);
}

.send-btn{
width:100%;
padding:16px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
font-size:1rem;
font-weight:600;
cursor:pointer;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 10px 25px rgba(139,92,246,0.3);
}

.send-btn:hover{
transform:translateY(-2px);
}

.send-btn:disabled{
opacity:.7;
cursor:not-allowed;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,0.3);
border-top-color:#fff;
border-radius:50%;
animation:spin .8s linear infinite;
display:none;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:#1e1b4b;
color:white;
padding:14px 22px;
border-radius:50px;
font-size:.9rem;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
opacity:0;
pointer-events:none;
transition:.4s;
z-index:999;
}

.toast.show{
opacity:1;
bottom:35px;
}

.preview{
margin-top:25px;
background:rgba(255,255,255,0.6);
padding:16px;
border-radius:22px;
}

.preview h3{
font-size:1rem;
margin-bottom:12px;
color:var(--text);
}

.preview-item{
font-size:.8rem;
line-height:1.6;
color:#555;
}

.floating{
position:fixed;
width:120px;
height:120px;
background:rgba(192,132,252,0.15);
border-radius:50%;
filter:blur(20px);
z-index:-1;
animation:float 6s ease-in-out infinite;
}

.f1{
top:0;
left:-20px;
}

.f2{
bottom:50px;
right:-20px;
animation-delay:2s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-15px);
}
}
</style>
</head>
<body>

<div class="floating f1"></div>
<div class="floating f2"></div>

<div class="container">
<div class="card">

<div class="top">
<button class="back-btn" onclick="window.location.href='index.html'">
<i class="fas fa-arrow-left"></i>
</button>

<div class="title">
<h1>AI Universe</h1>
<p>Premium Feedback Center</p>
</div>
</div>

<form id="feedbackForm">

<div class="input-group">
<i class="fas fa-user"></i>
<input type="text" id="name" placeholder="Your Name" required>
</div>

<div class="input-group">
<i class="fas fa-envelope"></i>
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<i class="fas fa-layer-group"></i>
<select id="type">
<option>General Feedback</option>
<option>Bug Report</option>
<option>Feature Request</option>
<option>UI/UX</option>
</select>
</div>

<div class="input-group">
<i class="fas fa-comment"></i>
<textarea id="message" maxlength="300" placeholder="Write your feedback..." required></textarea>
<div class="counter">
<span id="count">0</span>/300
</div>
</div>

<div class="rating" id="rating">
<i class="fas fa-star" data-rate="1"></i>
<i class="fas fa-star" data-rate="2"></i>
<i class="fas fa-star" data-rate="3"></i>
<i class="fas fa-star" data-rate="4"></i>
<i class="fas fa-star" data-rate="5"></i>
</div>

<button type="submit" class="send-btn" id="sendBtn">
<div class="spinner" id="spinner"></div>
<span id="btnText">Send Feedback</span>
<i class="fas fa-paper-plane"></i>
</button>

</form>

<div class="preview" id="previewBox" style="display:none;">
<h3>Latest Feedback</h3>
<div class="preview-item" id="previewContent"></div>
</div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>

emailjs.init("q5vozu2csm6VaK-CD");

const form = document.getElementById("feedbackForm");
const toast = document.getElementById("toast");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const sendBtn = document.getElementById("sendBtn");

let rating = 0;

function showToast(message){
toast.innerText = message;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);
}

const stars = document.querySelectorAll(".rating i");

stars.forEach(star=>{
star.addEventListener("click",()=>{
rating = star.dataset.rate;

stars.forEach(s=>{
s.classList.remove("active");

if(s.dataset.rate <= rating){
s.classList.add("active");
}
});
});
});

const messageInput = document.getElementById("message");
const count = document.getElementById("count");

messageInput.addEventListener("input",()=>{
count.innerText = messageInput.value.length;
});

form.addEventListener("submit", async(e)=>{
e.preventDefault();

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const type = document.getElementById("type").value;
const message = document.getElementById("message").value.trim();

if(!name || !email || !message){
showToast("Please fill all fields");
return;
}

if(rating === 0){
showToast("Please select rating");
return;
}

sendBtn.disabled = true;
spinner.style.display = "block";
btnText.innerText = "Sending...";

const templateParams = {
user_name:name,
user_email:email,
feedback_type:type,
message:message,
rating:rating,
date:new Date().toLocaleString(),
device:navigator.userAgent
};

try{

await emailjs.send(
"service_em6x1y8",
"template_ddxzwcr",
templateParams
);

showToast("Feedback Sent Successfully ✨");

localStorage.setItem("latestFeedback",JSON.stringify(templateParams));

document.getElementById("previewBox").style.display = "block";

document.getElementById("previewContent").innerHTML = `
<b>${name}</b><br>
${type} • ⭐ ${rating}<br><br>
${message}
`;

form.reset();

count.innerText = "0";

stars.forEach(s=>s.classList.remove("active"));

rating = 0;

}catch(error){

console.log(error);

showToast("Failed to send feedback");

}

sendBtn.disabled = false;
spinner.style.display = "none";
btnText.innerText = "Send Feedback";

});

window.onload = ()=>{

const latest = localStorage.getItem("latestFeedback");

if(latest){

const data = JSON.parse(latest);

document.getElementById("previewBox").style.display = "block";

document.getElementById("previewContent").innerHTML = `
<b>${data.user_name}</b><br>
${data.feedback_type} • ⭐ ${data.rating}<br><br>
${data.message}
`;

}

}

</script>

</body>
</html>

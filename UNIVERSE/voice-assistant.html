<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Voice Assistant • AI Universe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0015;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, #2d1b69 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, #7c3aed 0%, transparent 40%),
                  radial-gradient(ellipse at 40% 80%, #4c1d95 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 30%, #a855f7 0%, transparent 30%);
      animation: bgFloat 15s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(2%, -1%) rotate(1deg); }
      50% { transform: translate(-1%, 2%) rotate(-1deg); }
      75% { transform: translate(-2%, -2%) rotate(0.5deg); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 60px rgba(168, 85, 247, 0.4);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }

    /* Light orbs */
    .light-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }
    .light-orb.orb-1 {
      width: 300px;
      height: 300px;
      background: #7c3aed;
      top: -50px;
      left: -80px;
      animation: orbMove1 8s ease-in-out infinite;
    }
    .light-orb.orb-2 {
      width: 250px;
      height: 250px;
      background: #a855f7;
      bottom: -60px;
      right: -70px;
      animation: orbMove2 10s ease-in-out infinite;
    }
    .light-orb.orb-3 {
      width: 200px;
      height: 200px;
      background: #6d28d9;
      top: 40%;
      left: 50%;
      animation: orbMove3 12s ease-in-out infinite;
    }

    @keyframes orbMove1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(60px, 80px); }
    }
    @keyframes orbMove2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, -60px); }
    }
    @keyframes orbMove3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.4); }
    }

    /* Main container */
    .app-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* Back button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e4dcff;
      font-size: 1.1rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      z-index: 20;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
    }

    /* Title */
    .title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c4b5fd, #a855f7, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    /* Mic orb container */
    .mic-container {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Pulsing rings */
    .mic-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(168, 85, 247, 0.4);
      animation: ringPulse 2s ease-out infinite;
    }
    .mic-ring:nth-child(1) {
      width: 100%;
      height: 100%;
      animation-delay: 0s;
    }
    .mic-ring:nth-child(2) {
      width: 100%;
      height: 100%;
      animation-delay: 0.5s;
    }
    .mic-ring:nth-child(3) {
      width: 100%;
      height: 100%;
      animation-delay: 1s;
    }

    @keyframes ringPulse {
      0% {
        transform: scale(0.6);
        opacity: 1;
        border-color: rgba(168, 85, 247, 0.6);
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
        border-color: rgba(168, 85, 247, 0);
      }
    }

    /* Main mic button */
    .mic-button {
      position: relative;
      z-index: 5;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(168, 85, 247, 0.9));
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.6), 0 0 80px rgba(168, 85, 247, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      animation: micBreathe 3s ease-in-out infinite;
    }
    .mic-button i {
      font-size: 2.4rem;
      color: white;
      animation: micIconPulse 1.5s ease-in-out infinite;
    }
    .mic-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.9), 0 0 120px rgba(168, 85, 247, 0.5);
    }
    .mic-button:active {
      transform: scale(0.95);
    }

    @keyframes micBreathe {
      0%, 100% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.6), 0 0 80px rgba(168, 85, 247, 0.3); }
      50% { box-shadow: 0 0 55px rgba(124, 58, 237, 0.8), 0 0 110px rgba(168, 85, 247, 0.5); }
    }

    @keyframes micIconPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.8; }
    }

    /* Coming Soon text */
    .coming-soon {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e4dcff;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: comingSoonGlow 2s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
    }

    @keyframes comingSoonGlow {
      0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
      50% { opacity: 0.85; text-shadow: 0 0 35px rgba(168, 85, 247, 0.9); }
    }

    /* Description */
    .description {
      font-size: 0.9rem;
      color: #b4afd4;
      line-height: 1.5;
      max-width: 300px;
      opacity: 0.9;
    }

    /* Loading dots */
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 5px;
    }
    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a855f7;
      animation: dotBounce 1.4s ease-in-out infinite both;
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    .loading-dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    /* Glass card */
    .info-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 20px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .info-card .feature-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
    }
    .info-card .feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c4b5fd;
      font-size: 1rem;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    .info-card .feature-icon:hover {
      background: rgba(168, 85, 247, 0.3);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
      transform: translateY(-3px);
    }

    /* Responsive adjustments */
    @media (max-width: 380px) {
      .title { font-size: 1.6rem; }
      .mic-button { width: 80px; height: 80px; }
      .mic-button i { font-size: 2rem; }
      .mic-container { width: 140px; height: 140px; }
      .coming-soon { font-size: 1.3rem; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

  <!-- Background elements -->
  <div class="bg-gradient"></div>
  <div class="light-orb orb-1"></div>
  <div class="light-orb orb-2"></div>
  <div class="light-orb orb-3"></div>

  <!-- Particles container -->
  <div class="particles" id="particles"></div>

  <!-- Main app -->
  <div class="app-container">
    <!-- Back button -->
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Content -->
    <div class="content">
      <!-- Title -->
      <h1 class="title">Voice Assistant</h1>

      <!-- Mic orb -->
      <div class="mic-container">
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <button class="mic-button" id="micButton">
          <i class="fas fa-microphone"></i>
        </button>
      </div>

      <!-- Coming Soon -->
      <div class="coming-soon">Coming Soon</div>

      <!-- Description -->
      <p class="description">
        Next-generation AI voice experience is arriving soon.
      </p>

      <!-- Loading dots -->
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Info card -->
      <div class="info-card">
        <p style="color: #c4b5fd; font-size: 0.85rem; margin-bottom: 8px;">
          Powered by advanced AI speech models
        </p>
        <div class="feature-icons">
          <div class="feature-icon"><i class="fas fa-globe"></i></div>
          <div class="feature-icon"><i class="fas fa-brain"></i></div>
          <div class="feature-icon"><i class="fas fa-bolt"></i></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    const particleCount = 30;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 4 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 8 + 6 + 's';
      particle.style.animationDelay = Math.random() * 10 + 's';
      particle.style.opacity = Math.random() * 0.5 + 0.1;
      particlesContainer.appendChild(particle);
    }

    // Mic button click effect
    const micButton = document.getElementById('micButton');
    micButton.addEventListener('click', function() {
      // Ripple effect on click
      this.style.transform = 'scale(0.9)';
      setTimeout(() => {
        this.style.transform = '';
      }, 150);

      // Flash effect
      this.style.boxShadow = '0 0 80px rgba(168, 85, 247, 1), 0 0 160px rgba(124, 58, 237, 0.8)';
      setTimeout(() => {
        this.style.boxShadow = '';
      }, 400);

      // Pulse all rings faster temporarily
      const rings = document.querySelectorAll('.mic-ring');
      rings.forEach(ring => {
        ring.style.animationDuration = '0.8s';
        setTimeout(() => {
          ring.style.animationDuration = '2s';
        }, 800);
      });
    });

    // Smooth parallax on touch/mouse move
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      const orbs = document.querySelectorAll('.light-orb');
      orbs[0].style.transform = `translate(${x}px, ${y}px)`;
      orbs[1].style.transform = `translate(${-x * 0.7}px, ${-y * 0.7}px)`;
    });

    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const x = (touch.clientX / window.innerWidth - 0.5) * 20;
      const y = (touch.clientY / window.innerHeight - 0.5) * 20;
      const orbs = document.querySelectorAll('.light-orb');
      orbs[0].style.transform = `translate(${x}px, ${y}px)`;
      orbs[1].style.transform = `translate(${-x * 0.7}px, ${-y * 0.7}px)`;
    });
  </script>
</body>
</html>

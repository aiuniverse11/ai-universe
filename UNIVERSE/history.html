<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Universe • Recent Chats</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f3ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }
    .page-container {
      max-width: 480px;
      width: 100%;
      height: 90vh;
      background: #ffffff;
      border-radius: 44px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08), 0 10px 25px rgba(102, 51, 153, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(168, 126, 255, 0.1);
      border-radius: 44px 44px 0 0;
      z-index: 10;
    }
    .back-btn {
      font-size: 1.5rem;
      color: #4a3b7c;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 240, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
    }
    .header-title {
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-icons {
      display: flex;
      gap: 10px;
    }
    .icon-circle {
      font-size: 1.2rem;
      color: #4a3b7c;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 240, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
    }
    .search-box {
      background: #ffffff;
      border-radius: 30px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.08);
      border: 1px solid rgba(195, 166, 255, 0.4);
      margin: 12px 16px;
    }
    .search-box input {
      border: none;
      outline: none;
      font-size: 0.85rem;
      width: 100%;
      background: transparent;
      font-family: 'Poppins', sans-serif;
    }
    .action-row {
      display: flex;
      justify-content: space-between;
      padding: 0 16px 8px;
    }
    .action-btn {
      font-size: 0.7rem;
      color: #ef4444;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Poppins', sans-serif;
    }
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      scroll-behavior: smooth;
    }
    .scroll-area::-webkit-scrollbar {
      width: 4px;
    }
    .chat-card {
      background: white;
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 8px;
      border: 1px solid rgba(221, 214, 254, 0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      animation: fadeInUp 0.3s ease;
    }
    .chat-card:hover {
      transform: translateX(3px);
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.1);
      border-color: #c4b5fd;
    }
    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .chat-info {
      flex: 1;
    }
    .chat-title {
      font-weight: 600;
      font-size: 0.85rem;
      color: #2d1b5e;
    }
    .chat-last {
      font-size: 0.7rem;
      color: #6b5e9a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .chat-meta {
      text-align: right;
      flex-shrink: 0;
    }
    .chat-time {
      font-size: 0.6rem;
      color: #9e93c2;
    }
    .delete-chat {
      font-size: 0.65rem;
      color: #ef4444;
      cursor: pointer;
      margin-top: 4px;
      display: inline-block;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9e93c2;
    }
    .empty-state i {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
      color: #d4c2ff;
      animation: floatGlow 2.2s infinite;
    }
    @keyframes floatGlow {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      padding: 10px 12px 18px;
      border-top: 1px solid rgba(209, 190, 255, 0.5);
      border-radius: 0 0 44px 44px;
    }
    .nav-item {
      color: #8479b5;
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
    }
    .nav-item i { font-size: 1.3rem; }
    .voice-btn-center {
      background: linear-gradient(145deg, #a855f7, #7c3aed);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -26px;
      box-shadow: 0 12px 28px #a78bfa;
      color: white;
      font-size: 1.6rem;
      animation: floatGlow 2.2s infinite;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="page-container">
  <header class="top-header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="header-title">💬 Recent Chats</div>
    <div class="header-icons">
      <a href="notification.html" class="icon-circle"><i class="fas fa-bell"></i></a>
      <a href="profile.html" class="icon-circle"><i class="fas fa-user-circle"></i></a>
    </div>
  </header>

  <div class="search-box">
    <i class="fas fa-search" style="color:#a78bfa;"></i>
    <input type="text" id="searchInput" placeholder="Search chats...">
  </div>

  <div class="action-row">
    <span style="font-size:0.7rem;color:#6b5e9a;" id="chatCount">0 conversations</span>
    <button class="action-btn" id="clearAllBtn">Delete All</button>
  </div>

  <div class="scroll-area" id="chatList"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="chat.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
    <div class="voice-btn-center" onclick="window.location.href='chat.html'"><i class="fas fa-microphone"></i></div>
    <a href="models.html" class="nav-item"><i class="fas fa-cubes"></i><span>Models</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
  </nav>
</div>

<script>
  (function() {
    const chatList = document.getElementById('chatList');
    const searchInput = document.getElementById('searchInput');
    const chatCount = document.getElementById('chatCount');

    function getChats() {
      try {
        return JSON.parse(localStorage.getItem('aiUniverseChats') || '[]');
      } catch(e) {
        return [];
      }
    }

    function saveChats(chats) {
      localStorage.setItem('aiUniverseChats', JSON.stringify(chats));
    }

    function renderChats(filter = '') {
      const chats = getChats();
      const filtered = filter ? chats.filter(c => c.title.toLowerCase().includes(filter.toLowerCase()) || c.lastMessage.toLowerCase().includes(filter.toLowerCase())) : chats;
      chatCount.textContent = filtered.length + ' conversation' + (filtered.length !== 1 ? 's' : '');

      if (filtered.length === 0) {
        chatList.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>${filter ? 'No matching chats' : 'No Recent Chats Yet'}</p><a href="chat.html" style="color:#7c3aed;font-size:0.8rem;">Start chatting</a></div>`;
        return;
      }

      chatList.innerHTML = filtered.map((chat, index) => {
        const time = new Date(chat.timestamp).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
        const avatarBg = chat.type === 'user' ? '#ede4ff' : '#fce7f3';
        const avatarIcon = chat.type === 'user' ? 'fa-user' : 'fa-robot';
        return `
          <div class="chat-card" onclick="window.location.href='chat.html?chatId=${chat.id}'">
            <div class="chat-avatar" style="background:${avatarBg};"><i class="fas ${avatarIcon}" style="color:#7c3aed;"></i></div>
            <div class="chat-info">
              <div class="chat-title">${chat.title}</div>
              <div class="chat-last">${chat.lastMessage}</div>
            </div>
            <div class="chat-meta">
              <div class="chat-time">${time}</div>
              <span class="delete-chat" onclick="event.stopPropagation();window._deleteChat('${chat.id}')">🗑</span>
            </div>
          </div>
        `;
      }).join('');
    }

    window._deleteChat = function(id) {
      let chats = getChats();
      chats = chats.filter(c => c.id !== id);
      saveChats(chats);
      renderChats(searchInput.value);
    };

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (confirm('Delete all chat history?')) {
        saveChats([]);
        renderChats(searchInput.value);
      }
    });

    searchInput.addEventListener('input', () => {
      renderChats(searchInput.value);
    });
   
renderChats();

  })();
</script>
</body>
</html>

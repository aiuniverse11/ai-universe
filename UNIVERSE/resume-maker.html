<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Universe • Choose Your Resume Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      .top-bar{
  display:flex;
  justify-content:flex-start;
  margin-bottom:20px;
}

.back-btn{
  background:white;
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:10px;
  font-family:inherit;
  font-weight:600;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:all 0.2s;
}

.back-btn:hover{
  background:var(--primary);
  color:white;
  border-color:var(--primary);
  transform:translateY(-2px);
}
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-hover: 0 20px 40px rgba(0,0,0,0.12);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .page-container {
      max-width: 1100px;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .template-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .template-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary);
    }
    .card-preview {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--text-secondary);
      position: relative;
      overflow: hidden;
    }
    .card-body {
      padding: 16px;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card-body h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }
    .btn-use {
      display: inline-block;
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      text-decoration: none;
      text-align: center;
    }
    .btn-use:hover {
      background: var(--primary-dark);
    }
    /* Preview placeholders */
    .preview-modern { background: linear-gradient(135deg, #e0e7ff 0%, #f5f3ff 50%, #ede9fe 100%); }
    .preview-professional { background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 50%, #ecfdf5 100%); }
    .preview-minimal { background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 50%, #e5e5e5 100%); }
    .preview-sidebar { background: linear-gradient(135deg, #1e293b 0%, #1e293b 35%, #ffffff 35%, #ffffff 100%); }
    .preview-creative { background: linear-gradient(135deg, #fdf4ff 0%, #fef3c7 50%, #dbeafe 100%); }
    .preview-dark { background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e293b 100%); }
    .preview-corporate { background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 50%, #f0f9ff 100%); }
    .preview-elegant { background: linear-gradient(135deg, #fef2f2 0%, #fff7ed 50%, #faf5ff 100%); }
    .preview-tech { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%); }
    .preview-executive { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%); }
    .preview-placeholder-text {
      font-size: 0.65rem;
      color: #64748b;
      text-align: center;
      padding: 10px;
      line-height: 1.4;
    }
    .dark-text { color: #94a3b8; }
    @media screen and (max-width: 600px) {
      .header h1 { font-size: 1.5rem; }
      .template-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .card-preview { height: 140px; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- Header -->
     <div class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
</div>
    <div class="header">
      <h1>Choose Your Resume Template</h1>
      <p class="subtitle">Select a design to start building your professional resume</p>
    </div>

    <!-- Template Grid -->
    <div class="template-grid" id="templateGrid">
      <!-- Generated by JavaScript -->
    </div>
  </div>

  <script>
    const templates = [
      { name: 'Modern', previewClass: 'preview-modern', page: 'resume-builder1.html', desc: 'Clean & contemporary layout' },
      { name: 'Professional', previewClass: 'preview-professional', page: 'resume-builder2.html', desc: 'Traditional & reliable' },
      { name: 'Minimal', previewClass: 'preview-minimal', page: 'resume-builder3.html', desc: 'Simple & elegant design' },
      { name: 'Sidebar', previewClass: 'preview-sidebar', page: 'resume-builder4.html', desc: 'Dark sidebar layout' },
      { name: 'Creative', previewClass: 'preview-creative', page: 'resume-builder5.html', desc: 'Colorful & artistic' },
      { name: 'Dark', previewClass: 'preview-dark', page: 'resume-builder6.html', desc: 'Bold dark theme' },
      { name: 'Corporate', previewClass: 'preview-corporate', page: 'resume-builder7.html', desc: 'Business professional' },
      { name: 'Elegant', previewClass: 'preview-elegant', page: 'resume-builder8.html', desc: 'Refined & stylish' },
      { name: 'Tech', previewClass: 'preview-tech', page: 'resume-builder9.html', desc: 'Modern tech style' },
      { name: 'Executive', previewClass: 'preview-executive', page: 'resume-builder10.html', desc: 'Senior leadership' }
    ];

    const grid = document.getElementById('templateGrid');

    templates.forEach((template, index) => {
      const card = document.createElement('div');
      card.className = 'template-card';
      card.onclick = function() {
        window.location.href = template.page;
      };

      card.innerHTML = `
        <div class="card-preview ${template.previewClass}">
          <div class="preview-placeholder-text ${template.previewClass.includes('dark') || template.name === 'Dark' || template.name === 'Tech' || template.name === 'Sidebar' ? 'dark-text' : ''}">
            📄 ${template.name}<br>Resume Template
          </div>
        </div>
        <div class="card-body">
          <h3>${template.name}</h3>
          <button class="btn-use">Use Template</button>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
